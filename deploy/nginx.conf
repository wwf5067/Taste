worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    client_max_body_size 12m;   # 图片上传上限，略大于后端 MAX_IMAGE_MB

    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # 后端发布服务（同 docker 网络内的容器名）
    upstream taste_backend {
        server taste-backend:8092;
    }

    # ── 公开站点：HTTP，端口 80（宿主映射 8091）──
    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header Referrer-Policy strict-origin-when-cross-origin;

        root /usr/share/nginx/html;
        index index.html;

        # 带 hash 的静态资源长缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # VitePress cleanUrls: /health/ -> /health.html，找不到再回退 404
        location / {
            try_files $uri $uri.html $uri/index.html $uri/ /404.html;
        }

        error_page 404 /404.html;
    }

    # ── 作者后台：HTTPS（自签证书），端口 443（宿主映射另一端口，如 8443）──
    # 仅 /admin 与 /api 暴露，走 TLS 保护口令与图片上传。
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/selfsigned.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # 后台前端 + 发布 API 反代到后端容器
        location /admin {
            proxy_pass http://taste_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }
        location /api/ {
            proxy_pass http://taste_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        # 其余路径跳到后台入口
        location / {
            return 302 /admin/;
        }
    }
}
